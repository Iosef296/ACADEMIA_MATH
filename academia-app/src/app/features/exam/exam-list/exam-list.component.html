<div class="max-w-4xl mx-auto">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Simulacros</h1>
    <p class="text-sm text-gray-500 mt-1">Pon a prueba tus conocimientos con condiciones reales</p>
  </div>

  <!-- Search -->
  <div class="relative mb-6">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input [(ngModel)]="searchQuery" type="text" placeholder="Buscar simulacro o tema..."
      class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm
        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center items-center h-48">
    <svg class="animate-spin w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  </div>

  <!-- List -->
  <div *ngIf="!loading" class="space-y-3">

    <div *ngIf="filtered.length === 0"
      class="text-center py-12 text-gray-400 text-sm">
      No se encontraron simulacros.
    </div>

    <a *ngFor="let exam of filtered"
      [routerLink]="['/exams', exam.id]"
      class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 flex items-center gap-5
        hover:border-blue-200 hover:shadow-md transition group">

      <!-- Icon -->
      <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center shrink-0">
        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <h3 class="font-semibold text-gray-900 group-hover:text-blue-700 transition truncate">
          {{ exam.title }}
        </h3>
        <div class="flex items-center gap-3 mt-1.5 flex-wrap">
          <span class="text-xs text-gray-500">{{ exam.topic?.name }}</span>
          <span class="text-xs text-gray-400">·</span>
          <span class="text-xs text-gray-600">
            {{ exam.question_count }} pregunta{{ exam.question_count !== 1 ? 's' : '' }}
          </span>
          <span *ngIf="exam.time_limit" class="text-xs text-gray-600">
            · {{ exam.time_limit }} min
          </span>
        </div>
        <div class="flex items-center gap-2 mt-2 flex-wrap">
          <span *ngIf="exam.is_adaptive"
            class="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700 font-medium">
            Adaptativo
          </span>
          <span *ngIf="exam.lock_screen"
            class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-medium flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            Pantalla bloqueada
          </span>
        </div>
      </div>

      <svg class="w-5 h-5 text-gray-400 group-hover:text-blue-600 transition shrink-0"
        fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </a>

  </div>
</div>
