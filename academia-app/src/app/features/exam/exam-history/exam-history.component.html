<div class="max-w-4xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Historial de Exámenes</h1>
    <p class="text-sm text-gray-500 mt-1">Todos tus intentos de exámenes</p>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <svg class="animate-spin w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  </div>

  <div *ngIf="!loading && history.length === 0" class="text-center py-16 text-gray-400">
    Sin exámenes rendidos aún.
  </div>

  <div *ngIf="!loading && history.length > 0" class="bg-white rounded-xl border overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-5 py-3 text-left text-gray-600 font-medium">Examen</th>
          <th class="px-5 py-3 text-center text-gray-600 font-medium">Puntaje</th>
          <th class="px-5 py-3 text-center text-gray-600 font-medium">Estado</th>
          <th class="px-5 py-3 text-center text-gray-600 font-medium">Fecha</th>
          <th class="px-5 py-3 text-center text-gray-600 font-medium">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of history" class="border-b last:border-0 hover:bg-gray-50">
          <td class="px-5 py-4 font-medium text-gray-900">{{ a.examTitle }}</td>
          <td class="px-5 py-4 text-center">
            <span class="font-bold"
              [class.text-green-600]="a.score !== null && a.score >= 60"
              [class.text-red-600]="a.score !== null && a.score < 60"
              [class.text-gray-400]="a.score === null">
              {{ a.score !== null ? (a.score | number:'1.0-1') + '%' : '—' }}
            </span>
          </td>
          <td class="px-5 py-4 text-center">
            <span *ngIf="a.submittedAt" class="text-xs px-2 py-1 rounded-full font-medium"
              [class.bg-green-100]="a.passed" [class.text-green-700]="a.passed"
              [class.bg-red-100]="!a.passed" [class.text-red-700]="!a.passed">
              {{ a.passed ? 'Aprobado' : 'No aprobado' }}
            </span>
            <span *ngIf="!a.submittedAt" class="text-xs px-2 py-1 rounded-full bg-yellow-100 text-yellow-700">
              En curso
            </span>
          </td>
          <td class="px-5 py-4 text-center text-gray-500">{{ formatDate(a.submittedAt) }}</td>
          <td class="px-5 py-4 text-center">
            <div class="flex justify-center gap-2">
              <button (click)="viewResults(a.examId, a.attemptId)"
                class="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 px-2 py-1 rounded">
                Ver
              </button>
              <button *ngIf="a.passed" (click)="downloadCertificate(a.attemptId)"
                [disabled]="downloadingId === a.attemptId"
                class="text-xs text-green-600 hover:text-green-800 border border-green-200 px-2 py-1 rounded disabled:opacity-50">
                {{ downloadingId === a.attemptId ? '...' : '🎓 Cert.' }}
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
