<div class="max-w-5xl mx-auto">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Gestión de misiones</h1>
    <p class="text-sm text-gray-500 mt-1">{{ missions.length }} misiones en total</p>
  </div>

  <!-- Formulario nueva misión -->
  <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm mb-6">
    <h2 class="font-semibold text-gray-800 mb-4">Agregar misión</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
      <input [(ngModel)]="newMission.emoji" type="text" placeholder="Emoji"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-20" />
      <input [(ngModel)]="newMission.title" type="text" placeholder="Título de la misión"
        class="lg:col-span-2 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <select [(ngModel)]="newMission.missionType"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option *ngFor="let t of missionTypes" [value]="t.value">{{ t.label }}</option>
      </select>
      <input [(ngModel)]="newMission.targetValue" type="number" min="1" placeholder="Meta"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <button (click)="create()"
      class="mt-3 px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">
      + Agregar misión
    </button>
    <p *ngIf="error" class="mt-2 text-xs text-red-500">{{ error }}</p>
  </div>

  <!-- Lista de misiones -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div *ngIf="loading" class="flex justify-center py-12">
      <svg class="animate-spin w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <table *ngIf="!loading" class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Misión</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tipo</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Meta</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Estado</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <tr *ngFor="let m of missions" [class.opacity-50]="!m.active">
          <td class="px-4 py-3">
            <span class="mr-2">{{ m.emoji }}</span>
            <span class="font-medium text-gray-800">{{ m.title }}</span>
          </td>
          <td class="px-4 py-3 text-gray-500">{{ typeLabel(m.missionType) }}</td>
          <td class="px-4 py-3 text-center font-mono text-gray-700">{{ m.targetValue }}</td>
          <td class="px-4 py-3 text-center">
            <span class="px-2 py-0.5 rounded-full text-xs font-medium"
              [class]="m.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">
              {{ m.active ? 'Activa' : 'Inactiva' }}
            </span>
          </td>
          <td class="px-4 py-3 text-center">
            <div class="flex items-center justify-center gap-2">
              <button (click)="toggle(m)"
                class="text-xs px-3 py-1 rounded-lg border transition"
                [class]="m.active ? 'border-orange-300 text-orange-600 hover:bg-orange-50' : 'border-green-300 text-green-600 hover:bg-green-50'">
                {{ m.active ? 'Desactivar' : 'Activar' }}
              </button>
              <button (click)="delete(m)"
                class="text-xs px-3 py-1 rounded-lg border border-red-300 text-red-600 hover:bg-red-50 transition">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
