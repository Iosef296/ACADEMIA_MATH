<div class="max-w-5xl mx-auto">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Recompensas de nivel</h1>
    <p class="text-sm text-gray-500 mt-1">{{ rewards.length }} recompensas configuradas</p>
  </div>

  <!-- Formulario nueva recompensa -->
  <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm mb-6">
    <h2 class="font-semibold text-gray-800 mb-4">Agregar recompensa</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3">
      <input [(ngModel)]="newReward.emoji" type="text" placeholder="Emoji"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-20" />
      <input [(ngModel)]="newReward.level" type="number" min="1" placeholder="Nivel"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input [(ngModel)]="newReward.title" type="text" placeholder="Título"
        class="lg:col-span-2 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input [(ngModel)]="newReward.description" type="text" placeholder="Descripción"
        class="lg:col-span-2 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <input [(ngModel)]="newReward.bonusXp" type="number" min="0" placeholder="Bonus XP"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
    <button (click)="create()"
      class="mt-3 px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">
      + Agregar recompensa
    </button>
    <p *ngIf="error" class="mt-2 text-xs text-red-500">{{ error }}</p>
  </div>

  <!-- Lista de recompensas -->
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
    <div *ngIf="loading" class="flex justify-center py-12">
      <svg class="animate-spin w-6 h-6 text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>

    <table *ngIf="!loading" class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Nivel</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Recompensa</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Descripción</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Bonus XP</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Estado</th>
          <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <ng-container *ngFor="let r of rewards">

          <!-- Vista normal -->
          <tr *ngIf="editingReward?.id !== r.id" [class.opacity-50]="!r.active">
            <td class="px-4 py-3 text-center">
              <span class="text-lg mr-1">{{ r.emoji }}</span>
              <span class="font-bold text-blue-700">{{ r.level }}</span>
            </td>
            <td class="px-4 py-3 font-medium text-gray-800">{{ r.title }}</td>
            <td class="px-4 py-3 text-gray-500 text-xs max-w-xs truncate">{{ r.description }}</td>
            <td class="px-4 py-3 text-center">
              <span class="text-xs font-semibold text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded-full">+{{ r.bonusXp }} XP</span>
            </td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded-full text-xs font-medium"
                [class]="r.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'">
                {{ r.active ? 'Activa' : 'Inactiva' }}
              </span>
            </td>
            <td class="px-4 py-3 text-center">
              <div class="flex items-center justify-center gap-2">
                <button (click)="startEdit(r)"
                  class="text-xs px-3 py-1 rounded-lg border border-blue-300 text-blue-600 hover:bg-blue-50 transition">
                  Editar
                </button>
                <button (click)="delete(r)"
                  class="text-xs px-3 py-1 rounded-lg border border-red-300 text-red-600 hover:bg-red-50 transition">
                  Eliminar
                </button>
              </div>
            </td>
          </tr>

          <!-- Fila edición inline -->
          <tr *ngIf="editingReward?.id === r.id" class="bg-blue-50">
            <td class="px-4 py-2">
              <div class="flex items-center gap-1">
                <input [(ngModel)]="editCopy['emoji']" type="text"
                  class="w-14 border border-blue-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" />
                <input [(ngModel)]="editCopy['level']" type="number" min="1"
                  class="w-16 border border-blue-300 rounded-lg px-2 py-1.5 text-sm text-center focus:outline-none focus:ring-1 focus:ring-blue-500" />
              </div>
            </td>
            <td class="px-4 py-2">
              <input [(ngModel)]="editCopy['title']" type="text" placeholder="Título"
                class="w-full border border-blue-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" />
            </td>
            <td class="px-4 py-2">
              <input [(ngModel)]="editCopy['description']" type="text" placeholder="Descripción"
                class="w-full border border-blue-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" />
            </td>
            <td class="px-4 py-2 text-center">
              <input [(ngModel)]="editCopy['bonusXp']" type="number" min="0"
                class="w-24 border border-blue-300 rounded-lg px-2 py-1.5 text-sm text-center focus:outline-none focus:ring-1 focus:ring-blue-500" />
            </td>
            <td class="px-4 py-2 text-center">
              <label class="inline-flex items-center gap-1.5 cursor-pointer">
                <input type="checkbox" [(ngModel)]="editCopy['active']" class="rounded" />
                <span class="text-xs text-gray-600">Activa</span>
              </label>
            </td>
            <td class="px-4 py-2 text-center">
              <div class="flex items-center justify-center gap-2">
                <button (click)="saveEdit()"
                  class="text-xs px-3 py-1 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition font-medium">
                  Guardar
                </button>
                <button (click)="cancelEdit()"
                  class="text-xs px-3 py-1 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition">
                  Cancelar
                </button>
              </div>
            </td>
          </tr>

        </ng-container>
      </tbody>
    </table>
  </div>

</div>
