<div class="max-w-4xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Gestión de temas</h1>
      <p class="text-sm text-gray-500 mt-1">{{ topics.length }} temas en total</p>
    </div>
    <button (click)="showCreate = true"
      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold
        px-4 py-2.5 rounded-lg transition flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Nuevo tema
    </button>
  </div>

  <!-- Alerts -->
  <div *ngIf="error" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ error }}</div>
  <div *ngIf="success" class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">✓ {{ success }}</div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center items-center h-48">
    <svg class="animate-spin w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
  </div>

  <!-- Topic tree -->
  <div *ngIf="!loading" class="space-y-2">

    <div *ngIf="tree.length === 0"
      class="text-center py-12 border-2 border-dashed border-gray-200 rounded-xl text-gray-400 text-sm">
      No hay temas creados aún.
    </div>

    <ng-container *ngFor="let topic of tree">
      <ng-container *ngTemplateOutlet="topicRow; context: { $implicit: topic, depth: 0 }"></ng-container>
    </ng-container>

  </div>

</div>

<!-- Topic row template -->
<ng-template #topicRow let-topic let-depth="depth">

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden"
    [style.marginLeft.px]="depth * 24">

    <div class="flex items-center gap-3 px-4 py-3">

      <!-- Indent indicator -->
      <div *ngIf="depth > 0" class="w-1 self-stretch rounded-full bg-gray-200 shrink-0"></div>

      <!-- Lock icon -->
      <button (click)="toggleLock(topic)"
        class="p-1 rounded transition shrink-0"
        [class.text-amber-500]="topic.is_locked"
        [class.hover:text-amber-700]="topic.is_locked"
        [class.text-gray-300]="!topic.is_locked"
        [class.hover:text-gray-500]="!topic.is_locked"
        title="{{ topic.is_locked ? 'Desbloquear' : 'Bloquear' }}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path *ngIf="topic.is_locked" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          <path *ngIf="!topic.is_locked" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
        </svg>
      </button>

      <!-- Name / edit -->
      <div class="flex-1 min-w-0">
        <span *ngIf="editingId !== topic.id"
          class="text-sm font-medium text-gray-900">
          {{ topic.name }}
          <span *ngIf="topic.is_locked" class="text-xs text-amber-500 ml-1">(bloqueado)</span>
        </span>
        <input *ngIf="editingId === topic.id"
          [(ngModel)]="editingName" type="text"
          (keyup.enter)="saveTopic(topic)"
          (keyup.escape)="cancelEdit()"
          class="w-full px-3 py-1.5 border border-blue-300 rounded-lg text-sm
            focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <!-- Children count -->
      <span *ngIf="topic.children && topic.children.length > 0 && editingId !== topic.id"
        class="text-xs text-gray-400 shrink-0">
        {{ topic.children.length }} subtema{{ topic.children.length !== 1 ? 's' : '' }}
      </span>

      <!-- Actions -->
      <div class="flex items-center gap-1 shrink-0">

        <ng-container *ngIf="editingId !== topic.id && confirmDeleteId !== topic.id">
          <button (click)="startEdit(topic)"
            class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition"
            title="Editar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button (click)="confirmDelete(topic.id)"
            class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"
            title="Eliminar">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </ng-container>

        <!-- Save / cancel edit -->
        <ng-container *ngIf="editingId === topic.id">
          <button (click)="saveTopic(topic)" [disabled]="savingId === topic.id"
            class="p-1.5 text-green-600 hover:bg-green-50 rounded-lg transition disabled:opacity-50">
            <svg *ngIf="savingId !== topic.id" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <svg *ngIf="savingId === topic.id" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </button>
          <button (click)="cancelEdit()"
            class="p-1.5 text-gray-400 hover:bg-gray-100 rounded-lg transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </ng-container>

        <!-- Confirm delete inline -->
        <div *ngIf="confirmDeleteId === topic.id"
          class="flex items-center gap-1.5 bg-red-50 border border-red-200 rounded-lg px-2 py-1">
          <span class="text-xs text-red-700">¿Eliminar?</span>
          <button (click)="deleteTopic(topic)" [disabled]="deletingId === topic.id"
            class="text-xs font-semibold text-red-600 hover:text-red-800 transition disabled:opacity-50">
            Sí
          </button>
          <span class="text-red-300">|</span>
          <button (click)="cancelDelete()" class="text-xs text-gray-500 hover:text-gray-700 transition">No</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Recursive children -->
  <ng-container *ngIf="topic.children && topic.children.length > 0">
    <ng-container *ngFor="let child of topic.children">
      <ng-container *ngTemplateOutlet="topicRow; context: { $implicit: child, depth: depth + 1 }"></ng-container>
    </ng-container>
  </ng-container>

</ng-template>

<!-- Create modal -->
<div *ngIf="showCreate"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4"
  (click)="showCreate = false">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6"
    (click)="$event.stopPropagation()">

    <h3 class="font-semibold text-gray-900 mb-4">Nuevo tema</h3>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre del tema</label>
        <input [(ngModel)]="newName" type="text" placeholder="Ej: Álgebra lineal"
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm
            focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Tema padre (opcional)</label>
        <select [(ngModel)]="newParentId"
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm bg-white
            focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option [ngValue]="null">Ninguno (tema raíz)</option>
          <option *ngFor="let t of rootTopics" [ngValue]="t.id">{{ t.name }}</option>
        </select>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-5">
      <button (click)="showCreate = false"
        class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
        Cancelar
      </button>
      <button (click)="create()" [disabled]="creating || !newName.trim()"
        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white
          text-sm font-semibold rounded-lg transition flex items-center gap-2">
        <svg *ngIf="creating" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        {{ creating ? 'Creando...' : 'Crear tema' }}
      </button>
    </div>

  </div>
</div>
