<div class="max-w-3xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Metas de Estudio</h1>
      <p class="text-sm text-gray-500 mt-1">Define tus objetivos y horas de estudio semanales</p>
    </div>
    <button (click)="showForm = !showForm"
      class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">
      + Nueva Meta
    </button>
  </div>

  <div *ngIf="showForm" class="bg-white border border-gray-200 rounded-xl p-5 mb-6">
    <h3 class="font-semibold text-gray-900 mb-4">Nueva Meta</h3>
    <div *ngIf="error" class="text-red-600 text-sm mb-3">{{ error }}</div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <input [(ngModel)]="form.description" placeholder="Ej: Aprobar examen EESPP"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Horas/semana</label>
          <input type="number" [(ngModel)]="form.hoursPerWeek" min="1" max="40"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Fecha objetivo</label>
          <input type="date" [(ngModel)]="form.targetDate"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Puntaje objetivo (%)</label>
        <input type="number" [(ngModel)]="form.targetScore" min="0" max="100" placeholder="Ej: 75"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>
    <div class="flex gap-3 mt-4">
      <button (click)="save()" [disabled]="saving"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50">
        {{ saving ? 'Guardando...' : 'Guardar' }}
      </button>
      <button (click)="showForm = false" class="text-gray-600 px-4 py-2 text-sm">Cancelar</button>
    </div>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <svg class="animate-spin w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  </div>

  <div *ngIf="!loading && goals.length === 0" class="text-center py-12 text-gray-400">
    Sin metas aún. ¡Crea una para empezar!
  </div>

  <div class="space-y-4">
    <div *ngFor="let g of goals"
      class="bg-white border rounded-xl p-5 flex items-start justify-between"
      [class.opacity-50]="!g.isActive">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <span class="font-semibold text-gray-900">{{ g.description }}</span>
          <span *ngIf="!g.isActive" class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">Inactiva</span>
        </div>
        <div class="flex gap-4 text-sm text-gray-500">
          <span>⏱ {{ g.hoursPerWeek }}h/semana</span>
          <span *ngIf="g.targetDate">📅 {{ g.targetDate | date:'dd/MM/yyyy' }}</span>
          <span *ngIf="g.targetScore">🎯 {{ g.targetScore }}%</span>
        </div>
      </div>
      <div class="flex gap-2">
        <button *ngIf="g.isActive" (click)="deactivate(g.id)"
          class="text-xs text-yellow-600 hover:text-yellow-800 border border-yellow-200 px-2 py-1 rounded">
          Pausar
        </button>
        <button (click)="delete(g.id)"
          class="text-xs text-red-600 hover:text-red-800 border border-red-200 px-2 py-1 rounded">
          Eliminar
        </button>
      </div>
    </div>
  </div>
</div>
