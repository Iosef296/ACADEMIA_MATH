<div class="space-y-4">

  <div *ngIf="steps.length === 0" class="text-center py-6 border-2 border-dashed border-gray-200 rounded-xl text-gray-400 text-sm">
    Sin pasos. Agrega el primer paso.
  </div>

  <div *ngFor="let step of steps; let i = index"
    class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">

    <!-- Step header -->
    <div class="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-b border-gray-100">
      <span class="text-sm font-semibold text-gray-700">Paso {{ step.stepOrder }}</span>
      <div class="flex items-center gap-1">
        <button (click)="moveUp(i)" [disabled]="i === 0"
          class="p-1 rounded hover:bg-gray-200 transition disabled:opacity-30">
          <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
          </svg>
        </button>
        <button (click)="moveDown(i)" [disabled]="i === steps.length - 1"
          class="p-1 rounded hover:bg-gray-200 transition disabled:opacity-30">
          <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <button (click)="removeStep(i)"
          class="p-1 rounded hover:bg-red-50 text-red-400 hover:text-red-600 transition ml-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Step content -->
    <div class="p-4 space-y-3">

      <!-- LaTeX content -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Contenido del paso (LaTeX)</label>
        <app-math-editor
          [initialValue]="step.contentLatex"
          (latexChange)="onLatexChange(i, $event)">
        </app-math-editor>
      </div>

      <!-- Hint -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Pista (opcional)</label>
        <input [(ngModel)]="step.hint" type="text" placeholder="Pista para el estudiante..."
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
            focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent" />
      </div>

      <!-- Warning -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Nota de advertencia (opcional)</label>
        <input [(ngModel)]="step.warning" type="text" placeholder="Ej: No olvides verificar el dominio..."
          class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
            focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
      </div>

    </div>
  </div>

  <!-- Add step button -->
  <button (click)="addStep()"
    class="w-full border-2 border-dashed border-blue-300 text-blue-600 rounded-xl py-3
      hover:border-blue-400 hover:bg-blue-50 transition text-sm font-medium flex items-center justify-center gap-2">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    Agregar paso
  </button>

</div>
