<div class="max-w-4xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Temas</h1>
      <p class="text-sm text-gray-500 mt-1">Explora y aprende a tu ritmo</p>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">⚠️ {{ error }}</div>

  <!-- Search -->
  <div class="relative mb-6">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input
      [(ngModel)]="searchQuery"
      type="text"
      placeholder="Buscar tema..."
      class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm
        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center h-48">
    <svg class="animate-spin w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
    </svg>
  </div>

  <!-- Topic list -->
  <div *ngIf="!loading" class="space-y-3">

    <div *ngIf="filtered.length === 0" class="text-center py-12 text-gray-400">
      No se encontraron temas.
    </div>

    <ng-container *ngFor="let topic of filtered">
      <!-- Parent topic -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <a [routerLink]="['/topics', topic.id]"
          class="flex items-center justify-between p-5 hover:bg-gray-50 transition group"
          [class.opacity-60]="topic.is_locked">

          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-sm"
              [class.bg-blue-600]="!topic.is_locked"
              [class.bg-gray-300]="topic.is_locked">
              {{ topic.order }}
            </div>
            <div>
              <div class="flex items-center gap-2">
                <h3 class="font-semibold text-gray-900 group-hover:text-blue-700 transition">
                  {{ topic.name }}
                </h3>
                <svg *ngIf="topic.is_locked" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <p class="text-sm text-gray-500 mt-0.5">{{ topic.description }}</p>
            </div>
          </div>

          <svg class="w-5 h-5 text-gray-400 group-hover:text-blue-600 transition shrink-0"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>

        <!-- Subtopics -->
        <div *ngIf="topic.children && topic.children.length > 0"
          class="border-t border-gray-50 divide-y divide-gray-50">
          <a *ngFor="let child of topic.children"
            [routerLink]="['/topics', child.id]"
            class="flex items-center justify-between px-5 py-3 pl-16 hover:bg-gray-50 transition group text-sm"
            [class.opacity-60]="child.is_locked">
            <div class="flex items-center gap-2">
              <svg class="w-3.5 h-3.5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
              <span class="text-gray-700 group-hover:text-blue-700 transition">{{ child.name }}</span>
              <svg *ngIf="child.is_locked" class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <svg class="w-4 h-4 text-gray-300 group-hover:text-blue-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </a>
        </div>

      </div>
    </ng-container>

  </div>

</div>
