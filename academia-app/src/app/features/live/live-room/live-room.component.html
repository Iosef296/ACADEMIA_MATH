<!-- Loading -->
<div *ngIf="loading" class="flex justify-center items-center h-screen">
  <svg class="animate-spin w-8 h-8 text-blue-600" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
  </svg>
</div>

<!-- Error -->
<div *ngIf="!loading && error"
  class="flex flex-col items-center justify-center h-screen gap-4 text-center px-4">
  <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
    </svg>
  </div>
  <p class="text-gray-700 font-medium">{{ error }}</p>
  <a routerLink="/live"
    class="text-sm text-blue-600 hover:underline font-medium">
    Volver a las sesiones
  </a>
</div>

<!-- Live room -->
<div *ngIf="!loading && !error && session" class="flex flex-col h-screen bg-gray-900">

  <!-- Top bar -->
  <div class="flex items-center justify-between px-5 py-3 bg-gray-800 border-b border-gray-700 shrink-0">
    <div class="flex items-center gap-3">
      <!-- Live badge -->
      <span class="flex items-center gap-1.5 px-2.5 py-1 bg-red-600 rounded-full text-xs font-bold text-white">
        <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
        EN VIVO
      </span>
      <div>
        <p class="text-white font-semibold text-sm">{{ session.title }}</p>
        <p class="text-gray-400 text-xs">
          <span *ngIf="session.course" class="text-blue-400 font-medium mr-1">{{ session.course }} ·</span>
          {{ session.teacherName }}
        </p>
      </div>
    </div>

    <div class="flex items-center gap-2">

      <!-- Whiteboard toggle -->
      <button (click)="toggleWhiteboard()"
        [class.bg-amber-500]="showWhiteboard"
        [class.hover:bg-amber-600]="showWhiteboard"
        [class.bg-gray-700]="!showWhiteboard"
        [class.hover:bg-gray-600]="!showWhiteboard"
        class="flex items-center gap-1.5 px-3 py-1.5 text-white text-xs font-semibold rounded-lg transition"
        title="Pizarra compartida">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15.232 5.232l3.536 3.536M9 11l6.071-6.071a2 2 0 012.829 0l.171.171a2 2 0 010 2.829L12 14H9v-3z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 20h18" />
        </svg>
        Pizarra
      </button>

      <!-- End session (owner only) -->
      <button *ngIf="isOwner"
        (click)="endSession()"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 hover:bg-amber-700
          text-white text-xs font-semibold rounded-lg transition"
        title="Finalizar sesión para todos">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
        </svg>
        Finalizar sesión
      </button>

      <!-- Leave button -->
      <button (click)="leave()"
        class="flex items-center gap-1.5 px-3 py-1.5 bg-red-600 hover:bg-red-700
          text-white text-xs font-semibold rounded-lg transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Salir
      </button>
    </div>
  </div>

  <!-- Main content: video + optional whiteboard -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Jitsi container -->
    <div [class.w-full]="!showWhiteboard" [class.w-1/2]="showWhiteboard" class="relative transition-all duration-300">
      <div *ngIf="!jitsiReady"
        class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-gray-400">
        <svg class="animate-spin w-8 h-8 text-blue-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
        <p class="text-sm">Conectando a la sala...</p>
      </div>
      <div #jitsiContainer class="w-full h-full"></div>
    </div>

    <!-- Whiteboard panel -->
    <div *ngIf="showWhiteboard"
      class="w-1/2 border-l border-gray-700 flex flex-col bg-white">
      <!-- Whiteboard header -->
      <div class="flex items-center justify-between px-4 py-2.5 bg-gray-100 border-b border-gray-200 shrink-0">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.232 5.232l3.536 3.536M9 11l6.071-6.071a2 2 0 012.829 0l.171.171a2 2 0 010 2.829L12 14H9v-3z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 20h18" />
          </svg>
          <span class="text-sm font-semibold text-gray-700">Pizarra compartida</span>
        </div>
        <span class="text-xs text-gray-400">Todos pueden ver y dibujar</span>
      </div>
      <!-- Excalidraw iframe -->
      <iframe
        [src]="whiteboardUrl"
        class="flex-1 w-full border-0"
        allow="clipboard-read; clipboard-write"
        title="Pizarra compartida">
      </iframe>
    </div>

  </div>

</div>
