name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 21 / Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: academia_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        working-directory: academia-api
        run: chmod +x gradlew

      - name: Build
        working-directory: academia-api
        run: ./gradlew build -x test

      - name: Test
        working-directory: academia-api
        run: ./gradlew test
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5435/academia_db_test
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-minimum-32-chars-ok
          JPA_DDL_AUTO: update
          FLYWAY_ENABLED: false

  frontend:
    name: Frontend (Angular 21 / Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: academia-app/package-lock.json

      - name: Install dependencies
        working-directory: academia-app
        run: npm ci

      - name: Build
        working-directory: academia-app
        run: npm run build

      - name: Test
        working-directory: academia-app
        run: npx vitest run --passWithNoTests
