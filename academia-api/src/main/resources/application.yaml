spring:
  application:
    name: academia-api
  datasource:
    url: jdbc:postgresql://localhost:5435/academia_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: academiaSecretKeyMinimo32CaracteresAqui123456789
  access-expiration: 900000
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 3000
  servlet:
    context-path: /api
